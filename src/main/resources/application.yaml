spring:
  application:
    name: mini-claude
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  ai:
    azure:
      openai:
        api-key: ${AZURE_OPENAI_API_KEY}
        endpoint: ${AZURE_OPENAI_ENDPOINT}
        chat:
          options:
            deployment-name: o4-mini
            temperature: 1
logging:
  level:
    org.springframework.ai: DEBUG
    org.springaicommunity.agent: DEBUG